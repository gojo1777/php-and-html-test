<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:40px;
        }

        .box{
            background:white;
            width:300px;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input, select, button{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        h2{
            text-align:center;
        }
    </style>
</head>
<body>

<div class="box">

<h2>Simple Calculator</h2>

<form method="POST">

    <input type="number" name="num1" placeholder="First Number" required>

    <input type="number" name="num2" placeholder="Second Number" required>

    <select name="operator" required>
        <option value="+">Add (+)</option>
        <option value="-">Subtract (-)</option>
        <option value="*">Multiply (*)</option>
        <option value="/">Divide (/)</option>
    </select>

    <button type="submit" name="calculate">Calculate</button>

</form>

<?php

if(isset($_POST['calculate'])){

    $num1 = $_POST['num1'];
    $num2 = $_POST['num2'];
    $operator = $_POST['operator'];

    $result = 0;

    if($operator == "+"){
        $result = $num1 + $num2;
    }

    elseif($operator == "-"){
        $result = $num1 - $num2;
    }

    elseif($operator == "*"){
        $result = $num1 * $num2;
    }

    elseif($operator == "/"){
        if($num2 != 0){
            $result = $num1 / $num2;
        } else {
            echo "<h3>Cannot divide by zero</h3>";
        }
    }

    echo "<h3>Answer : $result</h3>";
}

?>

</div>

</body>
</html>
